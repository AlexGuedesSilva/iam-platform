spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/iam_platform}
    username: ${SPRING_DATASOURCE_USERNAME:iam_user}
    password: ${SPRING_DATASOURCE_PASSWORD:iam_password}

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate

iam:
  security:
    jwt:
      rs256:
        private-key: ${JWT_PRIVATE_KEY}
        public-key: ${JWT_PUBLIC_KEY}
        key-id: ${JWT_KEY_ID:local-dev-key}
